<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:transparent;
}
img{
    width:100%;
    height:100%;
    object-fit:fill;
}
</style>
</head>

<body>

<img id="img">

<script>
const params = new URLSearchParams(location.search);
document.getElementById("img").src = params.get("image") + ".png";
</script>

</body>
</html>
